# Hourly Shop Autopilot trigger.
#
# Vercel's Hobby plan only allows DAILY crons, so the in-app cron runs the
# autopilot once a day (07:30 UTC). This workflow adds free hourly passes via
# GitHub Actions.
#
# One-time setup: repo Settings → Secrets and variables → Actions →
#   New repository secret:  name CRON_SECRET,  value = the CRON_SECRET from
#   the Vercel project's environment variables.
# Without the secret the workflow exits quietly and does nothing.

name: shop-autopilot-hourly

on:
  schedule:
    - cron: "15 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger autopilot pass
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET secret not set — skipping (see file header for setup)."
            exit 0
          fi
          curl -sS --max-time 280 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "https://octane-ajax.vercel.app/api/cron/shop-autopilot" | head -c 2000
